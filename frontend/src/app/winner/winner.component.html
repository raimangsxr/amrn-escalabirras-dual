@if (participant) {
<div
  class="flex h-full w-full flex-col items-center justify-center px-4 text-center"
  [ngClass]="{
    'bg-indigo-200': !flipBackground(),
    'bg-indigo-900': flipBackground()
  }"
>
  <div
    [class]="
      isShort()
        ? 'mt-0 text-[clamp(1rem,4vw,2rem)] font-extrabold leading-tight'
        : isMedium()
        ? '-mt-4 text-[clamp(1.5rem,5vw,4rem)] font-extrabold leading-tight md:-mt-10'
        : '-mt-4 text-[clamp(2rem,7vw,7rem)] font-extrabold leading-tight md:-mt-20'
    "
  >
    <span
      class="bg-gradient-to-r from-violet-500 to-pink-500 bg-clip-text text-transparent"
    >
      NUEVO RECORD!!
    </span>
  </div>
  <div
    [class]="
      isShort()
        ? 'mt-2 text-[clamp(1.25rem,5vw,2.5rem)] font-extrabold leading-tight'
        : isMedium()
        ? 'mt-6 text-[clamp(2rem,6vw,5rem)] font-extrabold leading-tight md:mt-12'
        : 'mt-12 text-[clamp(2.25rem,8vw,8rem)] font-extrabold leading-tight md:mt-48'
    "
  >
    <span
      class="break-words bg-gradient-to-r from-pink-500 to-violet-500 bg-clip-text text-transparent"
    >
      {{ participant.name | titlecase }}
    </span>
  </div>
  <div
    [class]="
      isShort()
        ? 'mt-2 text-[clamp(1.25rem,5vw,2.5rem)] font-extrabold leading-none'
        : isMedium()
        ? 'mt-4 text-[clamp(1.5rem,5.5vw,4rem)] font-extrabold leading-none md:mt-8'
        : 'mt-8 text-[clamp(2rem,7vw,7rem)] font-extrabold leading-none md:mt-20'
    "
  >
    <span
      class="bg-gradient-to-r from-pink-500 to-violet-500 bg-clip-text text-transparent"
    >
      {{ participant.crates }} cajas!
    </span>
  </div>
</div>
}
