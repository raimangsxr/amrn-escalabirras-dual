<div
  class="flex h-full w-full items-center justify-center overflow-y-auto bg-indigo-900 px-4 py-6"
>
  <form
    class="w-full max-w-sm rounded-lg bg-white p-6 shadow-2xl md:p-10"
    (submit)="$event.preventDefault(); submit()"
  >
    <h1
      class="mb-2 text-center text-[clamp(1.25rem,4vw,1.875rem)] font-extrabold leading-tight text-indigo-900"
    >
      II Torneo Motero de Escalabirras
    </h1>
    <p class="mb-6 text-center text-sm text-gray-600 md:mb-8 md:text-base">
      Inicia sesión para continuar
    </p>

    <label class="mb-2 block text-sm font-medium text-gray-700" for="password">
      Contraseña
    </label>
    <input
      id="password"
      name="password"
      type="password"
      autocomplete="current-password"
      class="mb-4 w-full rounded-md border-2 border-gray-300 p-2 text-base focus:border-indigo-600 focus:outline-none"
      [(ngModel)]="password"
      [disabled]="busy"
      autofocus
    />

    @if (errorMessage) {
    <div
      class="mb-4 rounded border border-red-400 bg-red-100 px-3 py-2 text-sm text-red-700"
      role="alert"
    >
      {{ errorMessage }}
    </div>
    }

    <button
      type="submit"
      class="w-full rounded bg-indigo-600 px-4 py-2 text-base font-bold text-white hover:bg-indigo-700 disabled:opacity-50"
      [disabled]="busy || password.length === 0"
    >
      {{ busy ? "Entrando..." : "Entrar" }}
    </button>
  </form>
</div>
