<div class="px-2">
  <div
    class="mb-3 text-center text-[clamp(1rem,2.5vw,1.875rem)] font-medium md:mb-5 md:text-left"
  >
    Últimos participantes
  </div>
  @if (history$ | async; as history) { @for (participant of history; track
  participant) {
  <div
    class="ml-2 mt-1 truncate text-[clamp(0.875rem,1.6vw,1.25rem)] md:ml-6 md:mt-2"
  >
    <app-participant [participant]="participant"></app-participant>
  </div>
  } @if (history.length === 0) {
  <div
    class="ml-2 mt-1 text-sm italic text-gray-500 md:ml-6 md:mt-2 md:text-base"
  >
    Sin participantes todavía.
  </div>
  } }
</div>
