# nginx config for the escalabirras SPA.
#
# Serves the built `dist/` directory with:
#   - SPA fallback (unknown paths -> index.html).
#   - gzip for text assets.
#   - long-lived caching for hashed bundles.
#   - basic security headers (CSP / frame-ancestors is set by the
#     backend; we set the rest here as a defense in depth).

server {
    listen       80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # SPA fallback: route every unknown path to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed bundles.
    location ~* \.(?:js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # No cache for index.html so deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
}