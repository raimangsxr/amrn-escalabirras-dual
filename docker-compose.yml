name: escalabirras

# Production compose for the escalabirras app.
#
# Brings up:
#   - db   (postgres:16, named volume)
#   - api  (built from backend/Dockerfile, depends on db)
#
# The frontend image (frontend/Dockerfile) is published separately as
# `escalabirras-web` and served behind an HTTPS-terminating proxy
# (nginx / Caddy / cloud LB). See PRODUCTION.md.
#
# Usage:
#   cp .env.example .env   # set ADMIN_PASSWORD, JWT_SECRET, ...
#   docker compose pull
#   docker compose up -d db api
#   docker compose logs -f api

services:
  db:
    image: postgres:16
    container_name: escalabirras-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-escalabirras}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-escalabirras}
    volumes:
      - escalabirras-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-escalabirras} -d ${POSTGRES_DB:-escalabirras}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - escalabirras-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: escalabirras-api:latest
    container_name: escalabirras-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-escalabirras}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-escalabirras}
      API_WORKERS: ${API_WORKERS:-2}
      API_LOG_LEVEL: ${API_LOG_LEVEL:-warning}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS must be set}
      FRAME_ANCESTORS: ${FRAME_ANCESTORS:?FRAME_ANCESTORS must be set}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - escalabirras-net

  # Optional Adminer instance for live debugging. Enable with
  # `docker compose --profile tools up -d adminer`.
  adminer:
    image: adminer:4.8.1
    container_name: escalabirras-adminer
    restart: unless-stopped
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    networks:
      - escalabirras-net

volumes:
  escalabirras-pgdata:

networks:
  escalabirras-net:
    driver: bridge