<div class="flex h-full min-h-0 flex-col">
  @if ((error$ | async); as errorMessage) {
  <div
    class="flex flex-shrink-0 items-center justify-between bg-red-600 px-4 py-2 text-white"
    role="alert"
  >
    <span>{{ errorMessage }}</span>
    <button
      type="button"
      class="ml-4 text-sm underline"
      (click)="dismissError()"
    >
      Descartar
    </button>
  </div>
  } @if (celebrating$ | async; as celebrating) {
  <app-winner [participant]="celebrating"></app-winner>
  } @else {
  <div class="flex h-full min-h-0 flex-col overflow-y-auto">
    <div
      class="flex flex-shrink-0 flex-col items-center justify-center gap-2 p-2 md:flex-row md:gap-4 md:p-4"
    >
      <div
        class="flex flex-col items-center text-center md:items-end md:text-right"
      >
        <div
          class="text-[clamp(1.5rem,4vw,3.75rem)] font-semibold leading-tight"
        >
          <span
            class="rounded bg-gradient-to-r from-indigo-600 to-pink-500 box-decoration-slice px-3 py-1 text-white"
          >
            {{ title }}
          </span>
        </div>
        <div class="mt-1 text-[clamp(1rem,3vw,2.25rem)] font-extrabold">
          <span
            class="rounded bg-gradient-to-r from-pink-500 to-indigo-600 box-decoration-slice px-2 text-white"
          >
            {{ subtitle }}
          </span>
        </div>
      </div>
      <img
        src="../assets/logo-motoclub.png"
        class="w-32 flex-shrink-0 md:w-72"
      />
    </div>
    <div
      class="mt-2 flex min-h-0 flex-1 flex-col items-center justify-center gap-4 px-2 md:mt-4 md:px-4 xl:flex-row xl:items-start xl:justify-around"
    >
      <div class="flex w-full justify-center xl:w-auto xl:basis-1/5">
        <img
          class="w-32 max-w-xs md:w-48 xl:w-full"
          src="../assets/logo-escalabirras.png"
        />
      </div>
      <div class="w-full xl:basis-3/5">
        <app-top3></app-top3>
      </div>
    </div>
    <div class="flex-shrink-0">
      <app-manager></app-manager>
    </div>
    <div
      class="mt-4 flex flex-shrink-0 flex-col justify-end gap-2 px-4 pb-4 sm:flex-row"
    >
      <button
        type="button"
        class="rounded bg-indigo-600 px-4 py-2 font-bold text-white hover:bg-indigo-700"
        (click)="openTokens()"
      >
        Tokens
      </button>
      <button
        type="button"
        class="rounded bg-gray-600 px-4 py-2 font-bold text-white hover:bg-gray-700"
        (click)="logout()"
      >
        Salir
      </button>
    </div>
  </div>
  } @if (showTokens) {
  <app-tokens (closeRequested)="closeTokens()"></app-tokens>
  }
</div>
