<div class="flex flex-col h-full min-h-0">
  <div
    *ngIf="(error$ | async) as errorMessage"
    class="bg-red-600 text-white px-4 py-2 flex items-center justify-between flex-shrink-0"
    role="alert"
  >
    <span>{{ errorMessage }}</span>
    <button
      type="button"
      class="ml-4 underline text-sm"
      (click)="dismissError()"
    >
      Descartar
    </button>
  </div>

  <ng-container *ngIf="celebrating$ | async as celebrating; else mainView">
    <app-winner [participant]="celebrating"></app-winner>
  </ng-container>

  <ng-template #mainView>
    <div class="flex flex-col h-full min-h-0 overflow-y-auto">
      <div class="flex flex-col md:flex-row justify-center items-center p-2 md:p-4 gap-2 md:gap-4 flex-shrink-0">
        <div class="flex flex-col items-center md:items-end text-center md:text-right">
          <div class="text-[clamp(1.5rem,4vw,3.75rem)] font-semibold leading-tight">
            <span class="box-decoration-slice bg-gradient-to-r from-indigo-600 to-pink-500 text-white px-3 py-1 rounded">
              {{ title }}
            </span>
          </div>
          <div class="text-[clamp(1rem,3vw,2.25rem)] font-extrabold mt-1">
            <span class="box-decoration-slice bg-gradient-to-r to-indigo-600 from-pink-500 text-white px-2 rounded">
              {{ subtitle }}
            </span>
          </div>
        </div>
        <img src="../assets/logo-motoclub.png" class="w-32 md:w-72 flex-shrink-0" />
      </div>

      <div class="mt-2 md:mt-4 flex flex-col xl:flex-row items-center xl:items-start justify-center xl:justify-around gap-4 px-2 md:px-4 flex-1 min-h-0">
        <div class="xl:basis-1/5 w-full xl:w-auto flex justify-center">
          <img class="w-32 md:w-48 xl:w-full max-w-xs" src="../assets/logo-escalabirras.png" />
        </div>
        <div class="xl:basis-3/5 w-full">
          <app-top3></app-top3>
        </div>
      </div>

      <div class="flex-shrink-0">
        <app-manager></app-manager>
      </div>

      <div class="flex flex-col sm:flex-row justify-end gap-2 mt-4 px-4 pb-4 flex-shrink-0">
        <button
          type="button"
          class="bg-indigo-600 text-white font-bold py-2 px-4 rounded hover:bg-indigo-700"
          (click)="openTokens()"
        >
          Tokens
        </button>
        <button
          type="button"
          class="bg-gray-600 text-white font-bold py-2 px-4 rounded hover:bg-gray-700"
          (click)="logout()"
        >
          Salir
        </button>
      </div>
    </div>
  </ng-template>

  <app-tokens *ngIf="showTokens" (closeRequested)="closeTokens()"></app-tokens>
</div>
