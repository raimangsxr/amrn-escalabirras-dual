<div class="flex flex-col lg:flex-row items-stretch justify-center gap-2 lg:gap-4 px-2 lg:px-4">
  <div class="lg:basis-4/12 w-full">
    <div class="lg:ml-4">
      <app-participant-list></app-participant-list>
    </div>
  </div>
  <div class="lg:basis-4/12 w-full">
    <div class="border-solid border-4 lg:border-8 border-red-600 rounded-lg h-full">
      <app-team-manager-red (newParticipantEvent)="addParticipant($event, 0)"></app-team-manager-red>
    </div>
  </div>
  <div class="lg:basis-4/12 w-full">
    <div class="border-solid border-4 lg:border-8 border-indigo-600 rounded-lg h-full">
      <app-team-manager-blue (newParticipantEvent)="addParticipant($event, 1)"></app-team-manager-blue>
    </div>
  </div>
</div>

<div class="mt-2 flex flex-col sm:flex-row items-center justify-center gap-2 px-2">
  <button #fin class="text-sm sm:text-base font-light py-1 px-3 border-2 rounded w-full sm:w-auto focus:outline-none focus:ring-2 focus:ring-indigo-500"
    (keydown.a)="addCrate(0)"
    (keydown.z)="removeCrate(0)"
    (keydown.s)="addCrate(1)"
    (keydown.x)="removeCrate(1)"
    (keydown.q)="clearSlot(0)"
    (keydown.w)="clearSlot(1)"
  >Focus para jugar</button>
</div>
