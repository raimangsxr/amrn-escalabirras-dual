<ng-container *ngIf="participant">
  <div
    class="flex flex-col items-center justify-center h-full w-full px-4 text-center"
    [ngClass]="{'bg-indigo-200': !flipBackground(), 'bg-indigo-900': flipBackground()}"
  >
    <div class="-mt-4 md:-mt-20 text-[clamp(2rem,7vw,7rem)] font-extrabold leading-tight">
      <span class="bg-clip-text text-transparent bg-gradient-to-r from-violet-500 to-pink-500">
        NUEVO RECORD!!
      </span>
    </div>
    <div class="mt-12 md:mt-48 text-[clamp(2.25rem,8vw,8rem)] font-extrabold leading-tight">
      <span class="bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-violet-500 break-words">
        {{ participant.name | titlecase }}
      </span>
    </div>
    <div class="mt-8 md:mt-20 text-[clamp(2rem,7vw,7rem)] font-extrabold leading-none">
      <span class="bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-violet-500">
        {{ participant.crates }} cajas!
      </span>
    </div>
  </div>
</ng-container>
