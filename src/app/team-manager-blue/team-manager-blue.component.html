@if ((slot$ | async); as slots) {
<div class="mt-3 flex flex-col items-center justify-center px-2 md:mt-5">
  <span
    class="rounded-md bg-indigo-600 p-2 text-[clamp(1.25rem,4vw,3.75rem)] font-normal leading-none text-white md:p-4"
  >
    Torre Azul
  </span>
</div>
<div
  class="mt-6 flex flex-col items-center justify-center px-2 text-center md:mt-14"
>
  <div
    class="max-w-full rounded bg-gradient-to-r from-pink-500 to-indigo-600 box-decoration-slice px-4 py-3 text-white md:px-8 md:py-5"
  >
    <p
      class="break-words text-[clamp(1.25rem,3.5vw,3.75rem)] font-bold leading-tight"
    >
      {{ slots[1]?.name ?? "- - -" }}
    </p>
  </div>
  <div class="mt-2 md:mt-3">
    <p class="text-[clamp(2rem,6vw,6rem)] font-semibold leading-none">
      {{ slots[1]?.crates ?? 0 }} cajas!
    </p>
  </div>
</div>
<div
  class="mt-4 flex flex-col items-center justify-center gap-2 px-2 sm:flex-row md:mt-5"
>
  <div class="py-1">
    <span class="text-sm font-light">Participante</span>
  </div>
  <div class="py-1">
    <div class="rounded-md border-2">
      <input
        type="text"
        maxlength="20"
        class="w-full rounded p-2 text-base sm:w-48"
        id="name-blue"
        placeholder="Nombre.."
        autocomplete="off"
        [(ngModel)]="name"
        (keydown.enter)="createParticipant()"
        [disabled]="slots[1] !== null"
      />
    </div>
  </div>
</div>
}
