<ng-container *ngIf="(slot$ | async) as slots">
  <div class="mt-3 md:mt-5 flex flex-col justify-center items-center px-2">
    <span class="text-[clamp(1.25rem,4vw,3.75rem)] font-normal p-2 md:p-4 rounded-md text-white bg-indigo-600 leading-none">
      Torre Azul
    </span>
  </div>
  <div class="mt-6 md:mt-14 flex flex-col justify-center items-center text-center px-2">
    <div class="box-decoration-slice bg-gradient-to-r to-indigo-600 from-pink-500 text-white py-3 md:py-5 px-4 md:px-8 rounded max-w-full">
      <p class="text-[clamp(1.25rem,3.5vw,3.75rem)] font-bold break-words leading-tight">
        {{ slots[1]?.name ?? '- - -' }}
      </p>
    </div>
    <div class="mt-2 md:mt-3">
      <p class="text-[clamp(2rem,6vw,6rem)] font-semibold leading-none">
        {{ slots[1]?.crates ?? 0 }} cajas!
      </p>
    </div>
  </div>

  <div class="mt-4 md:mt-5 flex flex-col sm:flex-row justify-center items-center gap-2 px-2">
    <div class="py-1">
      <span class="text-sm font-light">Participante</span>
    </div>
    <div class="py-1">
      <div class="border-2 rounded-md">
        <input
          type="text"
          maxlength="20"
          class="w-full sm:w-48 p-2 rounded text-base"
          id="name-blue"
          placeholder="Nombre.."
          autocomplete="off"
          [(ngModel)]="name"
          (keydown.enter)="createParticipant()"
          [disabled]="slots[1] !== null"
        />
      </div>
    </div>
  </div>
</ng-container>
