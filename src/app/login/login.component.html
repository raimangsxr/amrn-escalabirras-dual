<div class="flex items-center justify-center h-full w-full bg-indigo-900 px-4 py-6 overflow-y-auto">
  <form
    class="bg-white rounded-lg shadow-2xl w-full max-w-sm p-6 md:p-10"
    (submit)="$event.preventDefault(); submit()"
  >
    <h1 class="text-[clamp(1.25rem,4vw,1.875rem)] font-extrabold text-center text-indigo-900 mb-2 leading-tight">
      II Torneo Motero de Escalabirras
    </h1>
    <p class="text-center text-gray-600 text-sm md:text-base mb-6 md:mb-8">
      Inicia sesión para continuar
    </p>

    <label class="block text-sm font-medium text-gray-700 mb-2" for="password">
      Contraseña
    </label>
    <input
      id="password"
      name="password"
      type="password"
      autocomplete="current-password"
      class="w-full border-2 border-gray-300 rounded-md p-2 mb-4 text-base focus:outline-none focus:border-indigo-600"
      [(ngModel)]="password"
      [disabled]="busy"
      autofocus
    />

    <div
      *ngIf="errorMessage"
      class="bg-red-100 border border-red-400 text-red-700 px-3 py-2 rounded mb-4 text-sm"
      role="alert"
    >
      {{ errorMessage }}
    </div>

    <button
      type="submit"
      class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded hover:bg-indigo-700 disabled:opacity-50 text-base"
      [disabled]="busy || password.length === 0"
    >
      {{ busy ? 'Entrando...' : 'Entrar' }}
    </button>
  </form>
</div>
