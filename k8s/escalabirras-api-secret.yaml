apiVersion: v1
kind: Secret
metadata:
  name: escalabirras-api-secret
type: Opaque
stringData:
  ADMIN_PASSWORD: "__PON_AQUI_MIN_12_CHARS__"
  JWT_SECRET: "__GENERAR_CON_python3 -c 'import secrets; print(secrets.token_urlsafe(48))'__"
  DATABASE_URL: "postgresql+psycopg://escalabirras:__DB_PASS__@db-host:5432/escalabirras"